services:
  postgres:
    image: postgres:16-alpine
    container_name: eventflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eventflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-eventflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eventflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: eventflow_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-eventflow}:${POSTGRES_PASSWORD:-eventflow_secret}@postgres:5432/${POSTGRES_DB:-eventflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      API_KEYS: ${API_KEYS:-dev_key_123,test_key_456}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: eventflow_worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-eventflow}:${POSTGRES_PASSWORD:-eventflow_secret}@postgres:5432/${POSTGRES_DB:-eventflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      WORKER_CONCURRENCY: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      args:
        # VITE_ vars must be passed as build args — they're baked in at build time by Vite
        VITE_API_KEY: ${DASHBOARD_API_KEY:-dev_key_123}
    container_name: eventflow_dashboard
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
