server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # In production, /api calls go to the Railway API service URL
    # The VITE_API_URL env var bakes this in at build time
    location /api/ {
        proxy_pass ${API_SERVICE_URL}/;
        proxy_set_header Host $host;
    }
}