server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # In production the dashboard JS talks directly to the Render API URL
    # (baked in at build time via VITE_API_URL), so no proxy needed here.
    # The /api location below is only hit in local Docker Compose where
    # nginx also serves as a proxy — it's harmless in production.
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
